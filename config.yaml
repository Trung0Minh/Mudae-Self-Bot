# Mudae Self-Bot Configuration

# Target Discord channel ID where the bot will roll and claim
target_channel_id: 1449461306242629816

# Command to send for rolls (e.g., $wa, $ha, $ma)
roll_command: "$wa"

# How many rolls to perform each hour
rolls_per_hour: 10

# Claiming settings
claiming:
  # How often Mudae resets claims (usually 3 hours)
  claim_reset_interval: 3
  # The first reset of the day in UTC (usually 0)
  claim_reset_start: 0
  # Minimum kakera value to automatically claim
  min_kakera: 200

  # List of character names to claim regardless of value (case-insensitive)
  wishlist:
    - "Rem"
    - "Ram"
    - "Megumin"
    - "Saber"
    - "Emilia"
    - "Zero Two"
    - "Asuna"
    - "Anna Yanami"
    - "Violet Evergarden"
    - "Agnes Tachyon"
  # Whether to use buttons for claiming (if available)
  use_buttons: true
  # Whether to use reactions for claiming
  use_reactions: true

# Time-based rolling logic
timing:
  # Your local timezone (e.g., "Asia/Ho_Chi_Minh", "UTC")
  timezone: "Asia/Ho_Chi_Minh"
  # Delay (in seconds) after the exact hour starts before rolling
  start_delay_range: [1.0, 5.0]
  # Delay (in seconds) between each individual roll command
  roll_delay_range: [0.5, 2.5]

# Logging configuration
logging:
  level: "INFO"
  file: "bot.log"
